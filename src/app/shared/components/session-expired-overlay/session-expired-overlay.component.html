<div class="session-expired-overlay" *ngIf="display" aria-live="assertive">
  <div class="session-expired-container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    </div>
    <h2 class="title">La sesión ha expirado</h2>
    <p class="message">Por seguridad, tu sesión fue cerrada. Iniciá sesión nuevamente para continuar.</p>
    <button class="accept-btn" (click)="onAccept()">Aceptar</button>
  </div>
</div>
